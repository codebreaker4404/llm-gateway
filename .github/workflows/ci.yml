# GitHub Actions CI
# What it does: on every push / PR, GitHub automatically runs the code-quality checks (ruff + mypy + pytest).
# Why: broken code fails immediately and is caught before merge; this is standard at every company.
#
# Kept at the fixed path .github/workflows/ci.yml — GitHub discovers and runs it automatically.

name: CI                          # the name of this workflow (shown on the GitHub Actions page)

on:                               # when to trigger
  push:                           # on every push
  pull_request:                   # on every opened / updated PR

jobs:
  lint-and-test:                  # a job; name is arbitrary
    runs-on: ubuntu-latest        # run on a GitHub-provided Linux machine

    steps:
      # 1. Check out your code onto the machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install uv (the package manager used locally)
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 3. Install Python 3.12
      - name: Set up Python
        run: uv python install 3.12

      # 4. Install all dependencies per pyproject.toml / uv.lock (including dev deps)
      - name: Install dependencies
        run: uv sync --dev

      # 5. ruff: style / common-error checks (faster than mypy, so run it first)
      - name: Lint (ruff)
        run: uv run ruff check .

      # 6. mypy: strict type checking
      - name: Type check (mypy)
        run: uv run mypy --strict main.py

      # 7. pytest: run the tests (they mock Claude, so CI needs no real API key)
      - name: Test (pytest)
        run: uv run pytest -v
