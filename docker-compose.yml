# docker compose orchestration file
# What it does: describe all services in one file and start them with a single command.
# With only one api service the benefit is modest; but as the stack grows (vector store,
# monitoring, etc.), `docker compose up` brings the whole environment up at once — that's the point.
#
# Start:       docker compose up --build     # build the image and start (foreground, logs visible)
# Background:  docker compose up -d --build   # start detached
# Stop:        docker compose down            # stop and clean up

services:
  api:                          # service name, arbitrary (add more services alongside later)
    build: .                    # build the image from the Dockerfile in the current directory
    ports:
      - "8000:8000"             # port mapping, like docker run's -p: host 8000 -> container 8000
    environment:
      # the gateway's own auth key (downstream callers must present it)
      - GATEWAY_API_KEY=my-secret
      # the key the gateway uses to call Claude — passed through from your host env, not hard-coded here
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # if using an Anthropic-compatible endpoint (e.g. GLM/Z.ai), uncomment the next line
      # - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
    # restart: unless-stopped   # (optional) auto-restart on unexpected exit, common in production
